<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse Neural</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
#title {
  position: absolute; top: 18px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.3);
  font-family: sans-serif; font-size: 11px;
  letter-spacing: 0.3em; text-transform: uppercase;
  pointer-events: none;
}
#btn {
  position: absolute; bottom: 28px; left: 50%;
  transform: translateX(-50%);
  background: transparent;
  border: 0.5px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.5);
  font-family: sans-serif; font-size: 11px;
  letter-spacing: 0.2em; padding: 9px 26px;
  border-radius: 30px; cursor: pointer;
  transition: all 0.3s;
}
#btn:hover { border-color: rgba(255,255,255,0.7); color: #fff; }
#tooltip {
  position: absolute; pointer-events: none;
  background: rgba(0,0,0,0.85);
  border: 0.5px solid rgba(255,255,255,0.12);
  color: #fff; font-family: sans-serif;
  font-size: 12px; padding: 8px 13px;
  border-radius: 8px; opacity: 0;
  transition: opacity 0.15s; line-height: 1.6;
  white-space: nowrap;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">Synapse · Neural Workflow</div>
<button id="btn">▶ fire synapse</button>
<div id="tooltip"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const btn = document.getElementById('btn');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

const W = () => canvas.width;
const H = () => canvas.height;

const nodeData = [
  { id:0,  label:'Schedule trigger',   sub:'8 AM & 8 PM EAT'     },
  { id:1,  label:'Scrape Instagram',   sub:'Apify · 40 profiles'  },
  { id:2,  label:'Wait',               sub:'Rate limit buffer'     },
  { id:3,  label:'Filter & extract',   sub:'Clean profile data'    },
  { id:4,  label:'HTTP Request',       sub:'Groq · Llama 3.1'      },
  { id:5,  label:'Edit fields',        sub:'Parse AI output'       },
  { id:6,  label:'Is lead qualified?', sub:'Route by score'        },
  { id:7,  label:'Has email?',         sub:'Branch outreach'       },
  { id:8,  label:'Send email',         sub:'Gmail outreach'        },
  { id:9,  label:'Prepare record',     sub:'Airtable (email)'      },
  { id:10, label:'Save Airtable',      sub:'Email path'            },
  { id:11, label:'Prepare record',     sub:'Airtable (IG DM)'      },
  { id:12, label:'Save Airtable',      sub:'IG DM path'            },
  { id:13, label:'Aggregate',          sub:'All results'           },
  { id:14, label:'Slack summary',      sub:'Notify team'           },
];

const edges = [
  [0,1],[1,2],[1,3],[2,3],[3,4],[3,5],[4,5],[5,6],
  [6,7],[6,11],[7,8],[7,11],[8,9],[9,10],[10,13],
  [11,12],[12,13],[13,14]
];

// Fully free-moving nodes — random position, velocity, acceleration
const nodes = nodeData.map(n => ({
  ...n,
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  vx: (Math.random() - 0.5) * 1.8,
  vy: (Math.random() - 0.5) * 1.8,
  ax: 0, ay: 0,
  wanderAngle: Math.random() * Math.PI * 2,
  wanderSpeed: 0.02 + Math.random() * 0.04,
  speed: 0.4 + Math.random() * 1.2,
}));

// Dense background web — rotating/drifting threads
const webLines = [];
for (let i = 0; i < 400; i++) {
  webLines.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    angle: Math.random() * Math.PI * 2,
    len: 60 + Math.random() * 280,
    spread: (Math.random() - 0.5) * 2.5,
    rotSpeed: (Math.random() - 0.5) * 0.008,
    driftX: (Math.random() - 0.5) * 0.3,
    driftY: (Math.random() - 0.5) * 0.3,
    alpha: 0.015 + Math.random() * 0.05,
    flicker: Math.random() * 0.02,
    phase: Math.random() * Math.PI * 2,
  });
}

let webParticles = [];
let pulses = [];
let ghostThreads = [];
let activeSet = new Set();
let hoveredId = null;
let firing = false;
let tick = 0;

function spawnWebParticle() {
  const l = webLines[Math.floor(Math.random() * webLines.length)];
  webParticles.push({ l, t: 0, speed: 0.003 + Math.random() * 0.009, size: 0.6 + Math.random() });
}

function spawnPulse(a, b, bright) {
  pulses.push({ a, b, t: 0, speed: 0.007 + Math.random() * 0.012, bright: bright || false, size: bright ? 3 : 1.4 });
}

function spawnGhost() {
  const a = Math.floor(Math.random() * nodes.length);
  const b = Math.floor(Math.random() * nodes.length);
  if (a !== b) ghostThreads.push({ a, b, life: 1, decay: 0.003 + Math.random() * 0.006 });
}

setInterval(() => {
  if (webParticles.length < 150) spawnWebParticle();
  edges.forEach(([a, b]) => { if (Math.random() < 0.45) spawnPulse(a, b, false); });
  if (Math.random() < 0.4) spawnGhost();
}, 100);

function updateNodes() {
  nodes.forEach(n => {
    // Wander steering — continuously changing direction
    n.wanderAngle += (Math.random() - 0.5) * n.wanderSpeed * 2.5;
    const wanderForce = 0.04;
    n.ax = Math.cos(n.wanderAngle) * wanderForce;
    n.ay = Math.sin(n.wanderAngle) * wanderForce;

    // Random impulse bursts
    if (Math.random() < 0.008) {
      n.vx += (Math.random() - 0.5) * 3;
      n.vy += (Math.random() - 0.5) * 3;
    }

    // Apply acceleration
    n.vx += n.ax;
    n.vy += n.ay;

    // Speed limit
    const spd = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
    const maxSpd = n.speed * 2.5;
    if (spd > maxSpd) { n.vx = (n.vx / spd) * maxSpd; n.vy = (n.vy / spd) * maxSpd; }

    // Damp
    n.vx *= 0.97;
    n.vy *= 0.97;

    n.x += n.vx;
    n.y += n.vy;

    // Wrap around edges
    const pad = 40;
    if (n.x < -pad) n.x = W() + pad;
    if (n.x > W() + pad) n.x = -pad;
    if (n.y < -pad) n.y = H() + pad;
    if (n.y > H() + pad) n.y = -pad;
  });
}

function quadPt(x1, y1, x2, y2, t) {
  const mx = (x1 + x2) / 2 + (y2 - y1) * 0.2;
  const my = (y1 + y2) / 2 - (x2 - x1) * 0.15;
  const it = 1 - t;
  return { x: it*it*x1 + 2*it*t*mx + t*t*x2, y: it*it*y1 + 2*it*t*my + t*t*y2 };
}

function draw() {
  tick += 0.012;

  // Motion blur
  ctx.fillStyle = 'rgba(0,0,3,0.13)';
  ctx.fillRect(0, 0, W(), H());

  updateNodes();

  // Background web
  webLines.forEach(l => {
    l.angle += l.rotSpeed;
    l.x += l.driftX; l.y += l.driftY;
    if (l.x < -300) l.x = W() + 300;
    if (l.x > W() + 300) l.x = -300;
    if (l.y < -300) l.y = H() + 300;
    if (l.y > H() + 300) l.y = -300;
    const flk = l.alpha + Math.sin(tick * 1.8 + l.phase) * l.flicker;
    const x2 = l.x + Math.cos(l.angle + l.spread) * l.len;
    const y2 = l.y + Math.sin(l.angle + l.spread) * l.len;
    ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(155,185,255,${Math.max(0, flk)})`; ctx.lineWidth = 0.3; ctx.stroke();
    l._x2 = x2; l._y2 = y2;
  });

  // Web particles
  webParticles.forEach(p => {
    p.t += p.speed;
    const l = p.l;
    const px = l.x + (l._x2 - l.x) * p.t, py = l.y + (l._y2 - l.y) * p.t;
    ctx.beginPath(); ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${0.55 * (1 - p.t)})`; ctx.fill();
  });
  webParticles = webParticles.filter(p => p.t < 1);

  // Ghost threads
  ghostThreads.forEach(g => {
    g.life -= g.decay;
    const na = nodes[g.a], nb = nodes[g.b];
    ctx.beginPath(); ctx.moveTo(na.x, na.y); ctx.lineTo(nb.x, nb.y);
    ctx.strokeStyle = `rgba(170,200,255,${g.life * 0.07})`; ctx.lineWidth = 0.4; ctx.stroke();
    const gp = quadPt(na.x, na.y, nb.x, nb.y, 1 - g.life);
    ctx.beginPath(); ctx.arc(gp.x, gp.y, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(230,240,255,${g.life * 0.6})`; ctx.fill();
  });
  ghostThreads = ghostThreads.filter(g => g.life > 0);

  // Main edges
  edges.forEach(([a, b]) => {
    const na = nodes[a], nb = nodes[b];
    const active = activeSet.has(a) && activeSet.has(b);
    const mx = (na.x + nb.x) / 2 + (nb.y - na.y) * 0.2;
    const my = (na.y + nb.y) / 2 - (nb.x - na.x) * 0.15;
    ctx.beginPath(); ctx.moveTo(na.x, na.y); ctx.quadraticCurveTo(mx, my, nb.x, nb.y);
    if (active) {
      ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1.5;
      ctx.shadowColor = '#fff'; ctx.shadowBlur = 14; ctx.stroke(); ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.moveTo(na.x, na.y); ctx.quadraticCurveTo(mx, my, nb.x, nb.y);
      ctx.strokeStyle = 'rgba(200,220,255,0.25)'; ctx.lineWidth = 6; ctx.stroke();
    } else {
      ctx.strokeStyle = 'rgba(130,160,255,0.09)'; ctx.lineWidth = 0.7; ctx.stroke();
    }
  });

  // Pulses
  pulses.forEach(p => {
    p.t += p.speed;
    const na = nodes[p.a], nb = nodes[p.b];
    const active = activeSet.has(p.a) && activeSet.has(p.b);
    const bright = p.bright || active;
    for (let i = 6; i >= 0; i--) {
      const tt = Math.max(0, p.t - i * 0.03);
      const pos = quadPt(na.x, na.y, nb.x, nb.y, tt);
      const al = bright ? (0.75 - i * 0.1) : (0.28 - i * 0.035);
      const r = bright ? p.size * (2 - i * 0.22) : p.size * (1 - i * 0.1);
      if (r <= 0 || al <= 0) continue;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.fillStyle = bright ? `rgba(255,255,255,${al})` : `rgba(160,200,255,${al})`;
      if (bright && i === 0) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 18; }
      ctx.fill(); ctx.shadowBlur = 0;
    }
  });
  pulses = pulses.filter(p => p.t < 1.1);

  // Nodes
  nodes.forEach(n => {
    const active = activeSet.has(n.id);
    const hov = hoveredId === n.id;
    const spokeCount = active ? 24 : hov ? 14 : 7;

    // Spokes
    for (let i = 0; i < spokeCount; i++) {
      const ang = (i / spokeCount) * Math.PI * 2 + tick * (active ? 1.2 : 0.4);
      const len = active ? (60 + Math.sin(tick * 6 + i) * 30) : hov ? 30 : 14;
      ctx.beginPath(); ctx.moveTo(n.x, n.y);
      ctx.lineTo(n.x + Math.cos(ang) * len, n.y + Math.sin(ang) * len);
      ctx.strokeStyle = active ? `rgba(255,255,255,${0.18 + Math.sin(tick * 4 + i) * 0.07})` : `rgba(200,220,255,${hov ? 0.09 : 0.03})`;
      ctx.lineWidth = 0.5; ctx.stroke();
    }

    // Rings
    if (active) {
      for (let r = 0; r < 4; r++) {
        const rr = 16 + r * 16 + Math.sin(tick * 5 + r) * 6;
        ctx.beginPath(); ctx.arc(n.x, n.y, rr, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${0.28 - r * 0.06})`;
        ctx.lineWidth = 0.8; ctx.shadowColor = '#fff'; ctx.shadowBlur = 10; ctx.stroke(); ctx.shadowBlur = 0;
      }
    } else if (hov) {
      ctx.beginPath(); ctx.arc(n.x, n.y, 20, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(200,220,255,0.2)'; ctx.lineWidth = 0.8; ctx.stroke();
    }

    // Core
    const cr = active ? 11 : hov ? 8 : 5;
    ctx.beginPath(); ctx.arc(n.x, n.y, cr, 0, Math.PI * 2);
    ctx.fillStyle = active ? '#ffffff' : hov ? 'rgba(255,255,255,0.9)' : 'rgba(185,210,255,0.55)';
    if (active) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 28; }
    ctx.fill(); ctx.shadowBlur = 0;

    ctx.beginPath(); ctx.arc(n.x, n.y, active ? 3.5 : 1.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff'; ctx.fill();

    if (active || hov) {
      ctx.font = `${active ? '600' : '500'} 11px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = active ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.6)';
      if (active) { ctx.shadowColor = 'rgba(255,255,255,0.4)'; ctx.shadowBlur = 8; }
      ctx.fillText(n.label, n.x, n.y - 22);
      ctx.shadowBlur = 0;
    }
  });

  requestAnimationFrame(draw);
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  let found = null;
  nodes.forEach(n => {
    const dx = n.x - mx, dy = n.y - my;
    if (Math.sqrt(dx * dx + dy * dy) < 22) found = n.id;
  });
  hoveredId = found;
  if (found !== null) {
    const n = nodeData[found];
    tooltip.style.opacity = '1';
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 36) + 'px';
    tooltip.innerHTML = '<strong>' + n.label + '</strong><br><span style="color:rgba(255,255,255,0.4);font-size:11px">' + n.sub + '</span>';
  } else { tooltip.style.opacity = '0'; }
});

async function fireSynapse() {
  if (firing) return;
  firing = true; btn.textContent = '⚡ firing...';
  activeSet.clear();
  for (let id = 0; id < nodes.length; id++) {
    activeSet.add(id);
    edges.filter(([a, b]) => a === id || b === id).forEach(([a, b]) => {
      for (let i = 0; i < 8; i++) setTimeout(() => spawnPulse(a, b, true), i * 50);
    });
    for (let i = 0; i < 6; i++) {
      const rnd = Math.floor(Math.random() * nodes.length);
      ghostThreads.push({ a: id, b: rnd, life: 1, decay: 0.005 });
    }
    // Give active nodes a burst of speed
    nodes[id].vx += (Math.random() - 0.5) * 4;
    nodes[id].vy += (Math.random() - 0.5) * 4;
    await new Promise(r => setTimeout(r, 280));
  }
  await new Promise(r => setTimeout(r, 2500));
  activeSet.clear(); firing = false; btn.textContent = '▶ fire synapse';
}

btn.addEventListener('click', fireSynapse);
draw();
</script>
</body>
</html>
