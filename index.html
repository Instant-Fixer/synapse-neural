<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse — Jarvis</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; position: absolute; top: 0; left: 0; }

#api-modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.97); display: flex;
  align-items: center; justify-content: center; z-index: 200;
}
#api-box {
  border: 0.5px solid rgba(255,255,255,0.1); border-radius: 6px;
  padding: 36px 40px; max-width: 440px; width: 90%; text-align: center;
  background: rgba(5,5,15,0.98);
}
#api-box h2 { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 400; letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 6px; }
#api-box .sub { color: rgba(255,255,255,0.2); font-size: 10px; margin-bottom: 24px; line-height: 1.9; }
input.cred {
  width: 100%; background: rgba(255,255,255,0.03);
  border: 0.5px solid rgba(255,255,255,0.1); border-radius: 3px;
  padding: 11px 14px; color: rgba(255,255,255,0.7); font-size: 12px;
  outline: none; margin-bottom: 10px; font-family: 'Courier New', monospace;
}
input.cred::placeholder { color: rgba(255,255,255,0.15); }
#api-submit {
  background: transparent; border: 0.5px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.45); font-size: 11px; letter-spacing: 0.25em;
  padding: 10px 28px; border-radius: 20px; cursor: pointer;
  transition: all 0.3s; font-family: 'Courier New', monospace; margin-top: 4px;
}
#api-submit:hover { border-color: rgba(255,255,255,0.6); color: #fff; }

#topbar {
  position: absolute; top: 0; left: 0; width: 100%; padding: 14px 24px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 10; pointer-events: none;
}
#logo { font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 0.35em; }
#status-bar { display: flex; align-items: center; gap: 10px; }
.sdot { width: 5px; height: 5px; border-radius: 50%; background: rgba(100,200,255,0.7); animation: blink 2s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
#stext { font-size: 9px; color: rgba(100,200,255,0.4); letter-spacing: 0.2em; }
#vdots { display:flex;gap:3px;align-items:center;opacity:0;transition:opacity 0.3s; }
#vdots span { width:3px;height:10px;background:rgba(100,200,255,0.6);border-radius:1px;animation:vbar 0.5s ease infinite alternate; }
#vdots span:nth-child(2){animation-delay:0.1s}#vdots span:nth-child(3){animation-delay:0.2s}
@keyframes vbar{from{transform:scaleY(0.3)}to{transform:scaleY(1.5)}}

#jarvis-bubble {
  position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
  max-width: 520px; width: 90%; background: rgba(0,0,10,0.88);
  border: 0.5px solid rgba(100,180,255,0.2); border-radius: 8px;
  padding: 14px 18px; z-index: 10; pointer-events: none;
  opacity: 0; transition: opacity 0.5s; text-align: center;
}
.j-label { font-size: 9px; color: rgba(100,200,255,0.4); letter-spacing: 0.2em; margin-bottom: 7px; }
#j-text { font-size: 12px; color: rgba(255,255,255,0.8); line-height: 1.8; font-family: sans-serif; }

#mic-bar {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 10px; z-index: 10;
  opacity: 0; transition: opacity 0.3s;
}
#mic-bar.show { opacity: 1; }
#mic-dots { display:flex;gap:4px;align-items:center; }
#mic-dots span { width:3px;background:rgba(100,200,255,0.5);border-radius:2px;animation:mbar 0.4s ease infinite alternate; }
#mic-dots span:nth-child(1){height:6px}#mic-dots span:nth-child(2){height:12px;animation-delay:0.08s}
#mic-dots span:nth-child(3){height:18px;animation-delay:0.16s}#mic-dots span:nth-child(4){height:12px;animation-delay:0.24s}
#mic-dots span:nth-child(5){height:6px;animation-delay:0.32s}
@keyframes mbar{from{transform:scaleY(0.4)}to{transform:scaleY(1)}}
#mic-text { font-size: 9px; color: rgba(100,200,255,0.3); letter-spacing: 0.15em; }

#stats-bar {
  position: absolute; top: 52px; left: 20px;
  display: flex; flex-direction: column; gap: 7px; z-index: 10; pointer-events: none;
}
.stat { display: flex; align-items: center; gap: 10px; }
.stat-label { font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; width: 72px; }
.stat-bar { height: 1px; background: rgba(255,255,255,0.06); width: 60px; }
.stat-fill { height: 100%; background: rgba(100,200,255,0.5); transition: width 1.2s ease; }
.stat-num { font-size: 10px; color: rgba(100,200,255,0.5); width: 18px; }

#ticker {
  position: absolute; right: 0; top: 42px; width: 260px;
  height: calc(100% - 60px); overflow: hidden; z-index: 10;
  pointer-events: none; border-left: 0.5px solid rgba(255,255,255,0.04); padding: 10px 14px;
}
#ticker-header { font-size: 9px; color: rgba(255,255,255,0.15); letter-spacing: 0.2em; margin-bottom: 10px; }
.tick-line { font-size: 10px; line-height: 1.9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tick-line.g { color: rgba(100,220,255,0.65); }
.tick-line.b { color: rgba(180,200,255,0.4); }
.tick-line.w { color: rgba(255,255,255,0.22); }
.tick-line.d { color: rgba(255,255,255,0.06); }

#controls {
  position: absolute; bottom: 14px; right: 20px;
  display: flex; gap: 8px; z-index: 10;
}
.ctrl {
  background: transparent; border: 0.5px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.25); font-size: 9px; letter-spacing: 0.1em;
  padding: 6px 12px; border-radius: 12px; cursor: pointer;
  transition: all 0.3s; font-family: 'Courier New', monospace;
}
.ctrl:hover { border-color: rgba(100,200,255,0.4); color: rgba(100,200,255,0.7); }
.ctrl.active { border-color: rgba(100,200,255,0.4); color: rgba(100,200,255,0.7); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="api-modal">
  <div id="api-box">
    <h2>⬡ SYNAPSE JARVIS</h2>
    <p class="sub">// enter your airtable token to activate<br>// open in Chrome for voice — jarvis listens continuously</p>
    <input class="cred" id="airtable-input" type="password" placeholder="// airtable token  pat..." />
    <button id="api-submit">ACTIVATE JARVIS</button>
  </div>
</div>

<div id="topbar">
  <div id="logo">SYNAPSE // JARVIS</div>
  <div id="status-bar">
    <div id="vdots"><span></span><span></span><span></span></div>
    <div class="sdot"></div>
    <div id="stext">STANDBY</div>
  </div>
</div>

<div id="stats-bar">
  <div class="stat"><div class="stat-label">TOTAL</div><div class="stat-bar"><div class="stat-fill" id="bar-total" style="width:0%"></div></div><div class="stat-num" id="num-total">0</div></div>
  <div class="stat"><div class="stat-label">CONTACTED</div><div class="stat-bar"><div class="stat-fill" id="bar-contacted" style="width:0%"></div></div><div class="stat-num" id="num-contacted">0</div></div>
  <div class="stat"><div class="stat-label">FOLLOW-UP</div><div class="stat-bar"><div class="stat-fill" id="bar-followup" style="width:0%"></div></div><div class="stat-num" id="num-followup">0</div></div>
  <div class="stat"><div class="stat-label">COLD</div><div class="stat-bar"><div class="stat-fill" id="bar-cold" style="width:0%"></div></div><div class="stat-num" id="num-cold">0</div></div>
  <div class="stat"><div class="stat-label">CLIENTS</div><div class="stat-bar"><div class="stat-fill" id="bar-clients" style="width:0%"></div></div><div class="stat-num" id="num-clients">0</div></div>
</div>

<div id="ticker">
  <div id="ticker-header">// LIVE_FEED</div>
  <div id="ticker-feed"></div>
</div>

<div id="jarvis-bubble">
  <div class="j-label">⬡ JARVIS</div>
  <div id="j-text"></div>
</div>

<div id="mic-bar">
  <div id="mic-dots"><span></span><span></span><span></span><span></span><span></span></div>
  <div id="mic-text">LISTENING</div>
</div>

<div id="controls">
  <button class="ctrl" id="voice-btn">VOICE ON</button>
  <button class="ctrl" id="reset-btn">RESET</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
const W = () => canvas.width, H = () => canvas.height;

// ── WEBHOOK URL — update this after importing to n8n ──────────
const WEBHOOK_URL = 'https://i4fixer.app.n8n.cloud/webhook/jarvis';

// Node labels
const NODE_LABELS = [
  'SCHEDULE','SCRAPE_IG','WAIT','FILTER',
  'HTTP_REQUEST','EDIT_FIELDS','IS_QUALIFIED','HAS_EMAIL',
  'SEND_EMAIL','PREP_RECORD','SAVE_AIRTABLE','PREP_DM',
  'SAVE_DM','AGGREGATE','SLACK'
];

const CODE_CHARS = '01 SYNAPSE JARVIS LEADS QUALIFY OUTREACH FILTER EMAIL SLACK AIRTABLE GROQ INSTAGRAM SCRAPE ONBOARD INVOICE ><{}[]=>'.split('');

let t = 0;

// ── RINGS ──────────────────────────────────────────────────────
const RINGS = [
  { r: 110, tilt: 0.4,  speed: 0.007,  thickness: 22, color: [255,255,255], nodeIdx: [0,1,2] },
  { r: 170, tilt: -0.6, speed: -0.005, thickness: 28, color: [180,220,255], nodeIdx: [3,4,5] },
  { r: 230, tilt: 0.8,  speed: 0.004,  thickness: 32, color: [200,200,255], nodeIdx: [6,7,8] },
  { r: 295, tilt: -0.3, speed: -0.006, thickness: 26, color: [255,255,255], nodeIdx: [9,10,11] },
  { r: 355, tilt: 1.1,  speed: 0.003,  thickness: 30, color: [220,240,255], nodeIdx: [12,13,14] },
  { r:  70, tilt: 1.4,  speed: -0.012, thickness: 18, color: [255,255,255], nodeIdx: [0] },
];

RINGS.forEach(ring => {
  const circumference = Math.PI * 2 * ring.r;
  const charSpacing = 8;
  const charCount = Math.floor(circumference / charSpacing);
  const layers = Math.ceil(ring.thickness / 10);
  ring.rot = Math.random() * Math.PI * 2;
  ring.chars = Array.from({length: charCount * layers}, () => ({
    char: CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)],
    alpha: 0.15 + Math.random() * 0.75,
    size: 7 + Math.floor(Math.random() * 6),
    layer: Math.floor(Math.random() * layers),
    flickerSpeed: 0.02 + Math.random() * 0.06,
    flickerPhase: Math.random() * Math.PI * 2,
    bright: Math.random() < 0.06,
  }));
  ring.charCount = charCount;
  ring.layers = layers;
});

// ── ORB ────────────────────────────────────────────────────────
const ORB = Array.from({length: 250}, () => ({
  theta: Math.random() * Math.PI * 2, phi: Math.random() * Math.PI,
  r: 30 + Math.random() * 25, speed: (Math.random()-0.5)*0.015,
  drift: (Math.random()-0.5)*0.01, size: 0.8+Math.random()*1.8,
  alpha: 0.3+Math.random()*0.6,
}));

// ── NEBULAS ────────────────────────────────────────────────────
const NEBULAS = Array.from({length: 5}, () => ({
  ox: (Math.random()-0.5)*0.5, oy: (Math.random()-0.5)*0.5,
  r: 100+Math.random()*160, hue: [210,240,270,190,230][Math.floor(Math.random()*5)],
  alpha: 0.018+Math.random()*0.03, dx:(Math.random()-0.5)*0.0002, dy:(Math.random()-0.5)*0.0002,
}));

// ── STREAMS ────────────────────────────────────────────────────
let streams = [];
function spawnStream() {
  streams.push({ angle:Math.random()*Math.PI*2, r:40, speed:1.8+Math.random()*2.5, alpha:0.5+Math.random()*0.4, len:25+Math.random()*50, life:1 });
}
setInterval(() => { if(streams.length<18) spawnStream(); }, 120);

function project(ring, angle, cx, cy) {
  const cos_t=Math.cos(ring.tilt), sin_t=Math.sin(ring.tilt);
  const x=Math.cos(angle)*ring.r, z=Math.sin(angle)*ring.r;
  const ry=z*sin_t, depth=z*cos_t;
  const rx=cx+x*Math.cos(ring.rot)-depth*Math.sin(ring.rot);
  return { sx:rx, sy:cy+ry, depth, scale:0.3+(depth+ring.r)/(ring.r*2)*0.7 };
}

function drawFrame() {
  t += 0.008;
  ctx.fillStyle = 'rgba(0,0,4,0.15)';
  ctx.fillRect(0,0,W(),H());
  const cx=W()/2, cy=H()/2;

  NEBULAS.forEach(n => {
    n.ox+=n.dx; n.oy+=n.dy;
    const grd=ctx.createRadialGradient(cx+n.ox*W(),cy+n.oy*H(),0,cx+n.ox*W(),cy+n.oy*H(),n.r);
    grd.addColorStop(0,`hsla(${n.hue},60%,55%,${n.alpha})`); grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(cx+n.ox*W(),cy+n.oy*H(),n.r,0,Math.PI*2); ctx.fill();
  });

  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,90);
  cg.addColorStop(0,`rgba(180,220,255,${0.1+Math.sin(t*1.5)*0.03})`);
  cg.addColorStop(0.5,'rgba(100,160,255,0.05)'); cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(cx,cy,90,0,Math.PI*2); ctx.fill();

  ORB.forEach(p => {
    p.theta+=p.speed; p.phi+=p.drift;
    const x=cx+p.r*Math.sin(p.phi)*Math.cos(p.theta);
    const y=cy+p.r*Math.sin(p.phi)*Math.sin(p.theta)*0.65;
    const a=p.alpha*(0.7+Math.sin(t*2.5+p.theta)*0.3);
    ctx.beginPath(); ctx.arc(x,y,p.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(210,235,255,${a})`; ctx.fill();
  });

  const og=ctx.createRadialGradient(cx,cy,0,cx,cy,28);
  og.addColorStop(0,'rgba(240,250,255,0.95)'); og.addColorStop(0.4,'rgba(180,220,255,0.6)'); og.addColorStop(1,'transparent');
  ctx.fillStyle=og; ctx.shadowColor='rgba(180,220,255,0.9)'; ctx.shadowBlur=40;
  ctx.beginPath(); ctx.arc(cx,cy,28,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;

  RINGS.forEach(ring => {
    ring.rot+=ring.speed;
    const [r,g,b]=ring.color;
    for(let li=0;li<ring.layers;li++){
      const layerOffset=(li-ring.layers/2)*9;
      const tiltOffset=layerOffset*0.003;
      for(let ci=0;ci<ring.charCount;ci++){
        const charObj=ring.chars[ci+li*ring.charCount]||ring.chars[ci%ring.chars.length];
        const angle=ring.rot+(ci/ring.charCount)*Math.PI*2;
        const modRing={...ring,r:ring.r+layerOffset,tilt:ring.tilt+tiltOffset};
        const {sx,sy,scale,depth}=project(modRing,angle,cx,cy);
        if(sx<-20||sx>W()+20||sy<-20||sy>H()+20) continue;
        if(Math.random()<0.002) charObj.char=CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)];
        const flicker=charObj.alpha*(0.6+Math.sin(t*charObj.flickerSpeed*50+charObj.flickerPhase)*0.4);
        const depthAlpha=0.3+(depth+ring.r)/(ring.r*2)*0.7;
        const finalAlpha=flicker*depthAlpha*scale;
        if(finalAlpha<=0.02) continue;
        ctx.font=`${Math.round(charObj.size*scale)}px 'Courier New',monospace`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        if(charObj.bright){
          ctx.fillStyle=`rgba(255,255,255,${Math.min(finalAlpha*1.8,1)})`;
          ctx.shadowColor=`rgba(${r},${g},${b},0.7)`; ctx.shadowBlur=8;
        } else {
          ctx.fillStyle=`rgba(${r},${g},${b},${finalAlpha})`; ctx.shadowBlur=0;
        }
        ctx.fillText(charObj.char,sx,sy); ctx.shadowBlur=0;
      }
    }
    ring.nodeIdx.forEach((nodeId,i)=>{
      const angle=ring.rot+(i/ring.nodeIdx.length)*Math.PI*2+Math.PI*0.15;
      const {sx,sy,scale,depth}=project(ring,angle,cx,cy);
      if(sx<0||sx>W()||sy<0||sy>H()) return;
      const depthAlpha=0.4+(depth+ring.r)/(ring.r*2)*0.6;
      const labelAlpha=depthAlpha*scale;
      ctx.font=`bold ${Math.round(9*scale)}px 'Courier New',monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=`rgba(255,255,255,${labelAlpha*0.9})`;
      ctx.shadowColor=`rgba(${r},${g},${b},0.8)`; ctx.shadowBlur=6;
      ctx.fillText(NODE_LABELS[nodeId],sx,sy-14*scale); ctx.shadowBlur=0;
      ctx.beginPath(); ctx.arc(sx,sy,3*scale,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${labelAlpha})`;
      ctx.shadowColor='rgba(255,255,255,0.9)'; ctx.shadowBlur=10;
      ctx.fill(); ctx.shadowBlur=0;
    });
  });

  streams.forEach(s=>{
    s.r+=s.speed; s.life-=0.007;
    const x=cx+Math.cos(s.angle)*s.r, y=cy+Math.sin(s.angle)*s.r;
    const x2=cx+Math.cos(s.angle)*(s.r-s.len), y2=cy+Math.sin(s.angle)*(s.r-s.len);
    const grd=ctx.createLinearGradient(x2,y2,x,y);
    grd.addColorStop(0,'transparent'); grd.addColorStop(1,`rgba(200,230,255,${s.alpha*s.life})`);
    ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x,y);
    ctx.strokeStyle=grd; ctx.lineWidth=0.8; ctx.stroke();
    ctx.beginPath(); ctx.arc(x,y,1.8,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.alpha*s.life})`; ctx.fill();
  });
  streams=streams.filter(s=>s.life>0&&s.r<Math.max(W(),H())*0.75);

  requestAnimationFrame(drawFrame);
}
drawFrame();

// ── STATE ──────────────────────────────────────────────────────
let airtableToken='', voiceEnabled=true, leads=[], recognition=null;

document.getElementById('api-submit').addEventListener('click', () => {
  const at=document.getElementById('airtable-input').value.trim();
  if(!at||at.length<10){ document.getElementById('airtable-input').style.borderColor='rgba(255,80,80,0.5)'; return; }
  airtableToken=at;
  document.getElementById('api-modal').style.display='none';
  initJarvis();
});

// ── VOICE ──────────────────────────────────────────────────────
function speak(text) {
  if(!voiceEnabled||!window.speechSynthesis) return;
  if(isProcessing) return; // don't speak if user is talking
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.rate=0.9; utt.pitch=0.8; utt.volume=1;
  const voices=window.speechSynthesis.getVoices();
  const preferred=voices.find(v=>v.name.includes('Google UK English Male')||v.name.includes('Daniel')||v.name.includes('Alex'));
  if(preferred) utt.voice=preferred;
  utt.onstart=()=>document.getElementById('vdots').style.opacity='1';
  utt.onend=()=>document.getElementById('vdots').style.opacity='0';
  window.speechSynthesis.speak(utt);
}

// ── SPEECH RECOGNITION ─────────────────────────────────────────
let isProcessing = false;
let recognitionActive = false;

function startListening() {
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    document.getElementById('mic-text').textContent='NO MIC SUPPORT';
    return;
  }
  if(recognitionActive) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.continuous=false;
  recognition.interimResults=false;
  recognition.lang='en-US';
  recognition.maxAlternatives=1;

  recognition.onstart=()=>{
    recognitionActive=true;
    document.getElementById('mic-bar').classList.add('show');
    document.getElementById('mic-text').textContent='LISTENING';
    console.log('Recognition started');
  };

  recognition.onresult=async(e)=>{
    if(isProcessing) return;
    const transcript=e.results[0][0].transcript.trim();
    console.log('Heard:', transcript);
    if(transcript.length<2) return;
    isProcessing=true;
    document.getElementById('mic-text').textContent='PROCESSING';
    showBubble('...');
    const response=await askJarvis(transcript);
    if(response){ showBubble(response); speak(response); }
    isProcessing=false;
    document.getElementById('mic-text').textContent='LISTENING';
  };

  recognition.onerror=(e)=>{
    console.log('Recognition error:', e.error);
    recognitionActive=false;
    setTimeout(startListening, 1000);
  };

  recognition.onend=()=>{
    console.log('Recognition ended');
    recognitionActive=false;
    if(!isProcessing) setTimeout(startListening, 300);
  };

  try{ recognition.start(); }catch(e){ recognitionActive=false; setTimeout(startListening,1000); }
}

// ── ASK JARVIS via n8n webhook ─────────────────────────────────
async function askJarvis(question) {
  try {
    const res=await fetch(WEBHOOK_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question})
    });
    const text = await res.text();
    console.log('Webhook raw response:', text);
    if(!text || text.trim()==='') return null;
    try {
      const data=JSON.parse(text);
      return data.answer||null;
    } catch(e) {
      console.error('JSON parse error:', e, 'Raw:', text);
      return text;
    }
  } catch(e){ console.error('Webhook error',e); return null; }
}

function showBubble(text) {
  document.getElementById('j-text').textContent=text;
  document.getElementById('jarvis-bubble').style.opacity='1';
  if(text!=='...') setTimeout(()=>document.getElementById('jarvis-bubble').style.opacity='0',10000);
}

// ── AIRTABLE ───────────────────────────────────────────────────
async function fetchLeads() {
  if(!airtableToken) return;
  try {
    const res=await fetch('https://api.airtable.com/v0/appi1Ty254ogelZOf/tblIepM5hjGDYjpvZ?pageSize=50',{
      headers:{'Authorization':'Bearer '+airtableToken}
    });
    const data=await res.json();
    if(data.records){ leads=data.records; updateStats(); updateTicker(); }
  } catch(e){ console.error('Airtable error',e); }
}

function updateStats() {
  const total=leads.length;
  const contacted=leads.filter(l=>l.fields.status==='Contacted').length;
  const followup=leads.filter(l=>['Follow-up 1','Follow-up 2'].includes(l.fields.status)).length;
  const cold=leads.filter(l=>l.fields.status==='Cold').length;
  const clients=leads.filter(l=>['Client','Onboarded'].includes(l.fields.status)).length;
  document.getElementById('num-total').textContent=total;
  document.getElementById('num-contacted').textContent=contacted;
  document.getElementById('num-followup').textContent=followup;
  document.getElementById('num-cold').textContent=cold;
  document.getElementById('num-clients').textContent=clients;
  const pct=n=>total>0?Math.min(100,(n/total)*100)+'%':'0%';
  document.getElementById('bar-total').style.width='100%';
  document.getElementById('bar-contacted').style.width=pct(contacted);
  document.getElementById('bar-followup').style.width=pct(followup);
  document.getElementById('bar-cold').style.width=pct(cold);
  document.getElementById('bar-clients').style.width=pct(clients);
}

function updateTicker() {
  const feed=document.getElementById('ticker-feed'); feed.innerHTML='';
  addTick('> '+leads.length+' leads loaded','g');
  addTick('─────────────────────','d');
  leads.slice(0,20).forEach((l,i)=>{
    const f=l.fields;
    addTick(`[${String(i+1).padStart(2,'0')}] ${f.Name||f['IG Handle']||'UNKNOWN'}`,'g');
    addTick(`     ${f.Niche||'???'} | ${f.status||'NEW'}`,'b');
    if(f['Outreach Msg Sent']) addTick(`     "${(f['Outreach Msg Sent']).slice(0,40)}"`,'w');
    addTick('','d');
  });
}

function addTick(text,cls) {
  const div=document.createElement('div'); div.className='tick-line '+(cls||''); div.textContent=text;
  document.getElementById('ticker-feed').appendChild(div);
}

// ── AI LOOP ────────────────────────────────────────────────────
async function aiLoop() {
  while(true){
    await new Promise(r=>setTimeout(r,45000));
    if(leads.length===0) continue;
    const comment=await askJarvis('Give James a proactive pipeline update — what should he focus on right now?');
    if(comment){ showBubble(comment); speak(comment); }
  }
}

// ── CONTROLS ───────────────────────────────────────────────────
document.getElementById('voice-btn').addEventListener('click',()=>{
  voiceEnabled=!voiceEnabled;
  document.getElementById('voice-btn').textContent=voiceEnabled?'VOICE ON':'VOICE OFF';
  document.getElementById('voice-btn').classList.toggle('active',voiceEnabled);
});
document.getElementById('reset-btn').addEventListener('click',()=>{
  airtableToken='';
  if(recognition) recognition.stop();
  document.getElementById('api-modal').style.display='flex';
  document.getElementById('stext').textContent='STANDBY';
  document.getElementById('mic-bar').classList.remove('show');
});

// ── INIT ───────────────────────────────────────────────────────
async function initJarvis() {
  document.getElementById('stext').textContent='ONLINE';
  await fetchLeads();
  setInterval(fetchLeads,30000);

  // Greet after data is loaded
  setTimeout(async()=>{
    const greeting=await askJarvis('Jarvis just came online. Greet James by name and give a sharp 2-sentence pipeline summary based on the current leads data.');
    if(greeting){ showBubble(greeting); speak(greeting); }
  },1500);

  startListening();
  setTimeout(aiLoop, 120000); // start AI loop after 2 minutes
}

window.speechSynthesis.getVoices();
</script>
